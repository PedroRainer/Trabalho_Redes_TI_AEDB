services:
  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: front
    restart: unless-stopped
    expose:
      - "3000"       # usado internamente; servido pelo Caddy
    environment:
      - NODE_ENV=production

  views:
    build:
      context: ./views
      dockerfile: Dockerfile
    container_name: views
    restart: unless-stopped
    expose:
      - "8080"       # porta TCP interna
    # opcional (para testar pelo host com nc/cliente C):
    ports:
      - "8080:8080"

  caddy:
    image: mirror.gcr.io/library/caddy:2.8
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443" # se ativar TLS depois
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - front
      - views

volumes:
  caddy_data:
  caddy_config:
