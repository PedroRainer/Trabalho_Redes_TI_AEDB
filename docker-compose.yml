services:
  views:
    build:
      context: ./cmd/views
      dockerfile: Dockerfile
    container_name: views
    environment:
      - TZ=America/Sao_Paulo
    expose:
      - "1234"
    restart: unless-stopped

  front:
    build:
      context: ./cmd/frontend
      dockerfile: Dockerfile
    container_name: front
    environment:
      - TZ=America_Sao_Paulo
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - TCP_HOST=views
      - TCP_PORT=1234
      - PORT=3000
    depends_on:
      - views
    expose:
      - "3000"
    restart: unless-stopped

  caddy:
    image: caddy:2.8
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - front
    environment:
      - TZ=America/Sao_Paulo
    restart: unless-stopped
